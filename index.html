// ── Helpers ────────────────────────────────────────────────────────────────

function normalizeRest(r){
  if(r.ratings)return r;
  return{...r,ratings:r.author?{[r.author]:{food:r.food??5,service:r.service??5,price:r.price??3,stars:r.stars??7}}:{}};
}
function getAvgRest(r){
  const vals=Object.values(normalizeRest(r).ratings||{});
  if(!vals.length)return{food:0,service:0,price:0,stars:0,avg:0,count:0};
  const n=vals.length;
  const food=+(vals.reduce((s,x)=>s+x.food,0)/n).toFixed(1);
  const service=+(vals.reduce((s,x)=>s+x.service,0)/n).toFixed(1);
  const price=Math.round(vals.reduce((s,x)=>s+x.price,0)/n);
  const stars=+(vals.reduce((s,x)=>s+x.stars,0)/n).toFixed(1);
  return{food,service,price,stars,avg:+((food+service)/2).toFixed(1),count:n};
}
function getAvgWhisky(w){
  const vals=Object.values(w.ratings||{});
  if(!vals.length)return{stars:0,rauchigkeit:0,fruchtigkeit:0,count:0};
  const n=vals.length;
  return{
    stars:+(vals.reduce((s,x)=>s+x.stars,0)/n).toFixed(1),
    rauchigkeit:+(vals.reduce((s,x)=>s+x.rauchigkeit,0)/n).toFixed(1),
    fruchtigkeit:+(vals.reduce((s,x)=>s+x.fruchtigkeit,0)/n).toFixed(1),
    count:n
  };
}

function Slider({label,value,min,max,onChange,color,display,t}){
  const pct=((value-min)/(max-min))*100;
  return(
    <div style={{marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:13,fontFamily:"'Playfair Display',serif",color:t.label}}>{label}</span>
        <span style={{fontSize:22,fontWeight:700,fontFamily:"'Playfair Display',serif",color}}>{display??value}</span>

      <div style={{position:"relative",height:6,borderRadius:3,background:t.sliderTrack}}>
        <div style={{position:"absolute",left:0,top:0,height:"100%",borderRadius:3,background:`linear-gradient(90deg,${color}88,${color})`,width:`${pct}%`,transition:"width 0.1s"}}/>
        <input type="range" min={min} max={max} value={value} onChange={e=>onChange(+e.target.value)}
          style={{position:"absolute",top:-8,left:0,width:"100%",height:22,opacity:0,cursor:"pointer",zIndex:2,margin:0}}/>
        <div style={{position:"absolute",top:"50%",transform:"translateY(-50%)",left:`calc(${pct}% - 10px)`,width:20,height:20,borderRadius:"50%",background:color,boxShadow:`0 2px 8px ${color}55`,border:`3px solid ${t.thumb}`,transition:"left 0.1s",pointerEvents:"none"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        <span style={{fontSize:10,color:t.tick}}>{min}</span>
        <span style={{fontSize:10,color:t.tick}}>{max}</span>
      </div>
    </div>
  );
}

function Stars({value,t}){

function Badge({value,max=10,color}){

function Toast({msg,color,textColor}){

              style={{width:"100%",padding:"13px 16px",borderRadius:12,fontSize:15,border:`1.5px solid ${error?"#e05030":"#e0d8cc"}`,outline:"none",color:"#2c1f14",marginBottom:error?8:16,textAlign:"center",letterSpacing:2}}/>
            {error&&<div style={{color:"#e05030",fontSize:12,marginBottom:12}}>{error}</div>}

              style={{width:"100%",padding:"13px 16px",borderRadius:12,fontSize:15,border:`1.5px solid ${error?"#e05030":"#e0d8cc"}`,outline:"none",color:"#2c1f14",marginBottom:error?8:16,textAlign:"center"}}/>
            {error&&<div style={{color:"#e05030",fontSize:12,marginBottom:12}}>{error}</div>}
            <button onClick={doLogin} style={{width:"100%",padding:14,borderRadius:12,background:"linear-gradient(135deg,#2c1f14,#4a2e1a)",color:"white",fontSize:15,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"'Playfair Display',serif"}}>Einloggen</button>
          </>
        )}
      </div>
    </div>
  );
}

  const raters=Object.keys(normalizeRest(r).ratings||{});

  return(
    <div onClick={onClick} style={{background:t.card,borderRadius:16,padding:"16px 18px",boxShadow:`0 2px 12px ${t.cardShadow}`,cursor:"pointer",border:`1px solid ${t.cardBorder}`,marginBottom:12,transition:"transform 0.15s"}}

          <div style={{fontSize:12,color:t.sub,marginTop:2}}>📍 {r.city} · {cuisines.join(" & ")}</div>

          <div style={{fontSize:10,color:t.tick}}>Ø · {avg.count} Wertung{avg.count!==1?"en":""}</div>
        </div>
      </div>
      <div style={{marginTop:10}}><Stars value={avg.stars} t={t}/></div>
      <div style={{marginTop:10,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <Badge value={avg.food} color="#2e7d52"/><span style={{fontSize:11,color:t.sub}}>Essen</span>

      <div style={{textAlign:"right",marginTop:8}}><span style={{fontSize:10,color:t.tick,fontStyle:"italic"}}>vorgeschlagen von {s.author}</span></div>
    </div>
  );
}

              <div style={{display:"flex",gap:12,marginTop:4,fontSize:12,color:t.sub}}><span>🍽️ {rating.food}/10</span><span>🤝 {rating.service}/10</span><span>{"€".repeat(rating.price)}</span></div>
            </div>

        </div>
        {isAuthor&&<div style={{marginTop:16,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <button onClick={()=>onEdit(r)} style={{padding:"12px",borderRadius:12,background:t.innerCard,color:t.title,border:`1px solid ${t.cardBorder}`,fontSize:14,cursor:"pointer",fontWeight:600}}>✏️ Bearbeiten</button>
          <button onClick={()=>onDelete(r.id)} style={{padding:"12px",borderRadius:12,background:"#e0503015",color:"#e05030",border:"1px solid #e0503040",fontSize:14,cursor:"pointer",fontWeight:600}}>🗑️ Löschen</button>
        </div>}
        {!isAuthor&&!hasRated&&<button onClick={()=>onRate(r)} style={{marginTop:16,width:"100%",padding:14,borderRadius:12,background:t.restBtn,color:t.btnColor,fontSize:15,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"'Playfair Display',serif"}}>⭐ Eigene Wertung abgeben</button>}
        {!isAuthor&&hasRated&&<button onClick={()=>onRate(r)} style={{marginTop:16,width:"100%",padding:14,borderRadius:12,background:t.secondaryBtn,color:t.secondaryBtnColor,fontSize:15,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"'Playfair Display',serif"}}>✏️ Meine Wertung bearbeiten</button>}
      </div>
    </div>
  );
}

function RestSuggModal({s,user,onClose,onDelete,onConvert,t}){

function RestaurantApp({user,dark,setDark,mode,setMode,t}){
  const [view,setView]=useState("list");
  const [activeSection,setSection]=useState("list");
  const [restaurants,setRestaurants]=useState([]);
  const [suggestions,setSuggestions]=useState([]);

  const [form,setForm]=useState(EMPTY_REST);
  const [ratingForm,setRatingForm]=useState(EMPTY_RATING);
  const [ratingTarget,setRatingTarget]=useState(null);
  const [suggForm,setSuggForm]=useState(EMPTY_SUGG);
  const [suggToConvert,setSuggToConvert]=useState(null);
  const [restFilter,setRestFilter]=useState({search:"",k1:"",k2:"",author:""});
  const [suggFilter,setSuggFilter]=useState({search:"",k1:"",k2:""});
  const [selected,setSelected]=useState(null);
  const [suggSelected,setSuggSelected]=useState(null);
  const [editingId,setEditingId]=useState(null);
  const [errors,setErrors]=useState({});
  const [suggErrors,setSuggErrors]=useState({});
  const [saving,setSaving]=useState(false);
  const [toast,setToast]=useState("");
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  useEffect(()=>{
    let ref;try{ref=db.ref("restaurants");ref.on("value",snap=>{const d=snap.val();setRestaurants(d?Object.values(d):[]);setLoading(false);},()=>setLoading(false));}catch{setLoading(false);}
    const tm=setTimeout(()=>setLoading(false),5000);return()=>{ref&&ref.off();clearTimeout(tm);};
  },[]);
  useEffect(()=>{
    let ref;try{ref=db.ref("suggestions");ref.on("value",snap=>{const d=snap.val();setSuggestions(d?Object.values(d):[]);});}catch{}
    return()=>ref&&ref.off();
  },[]);

  const cities=[...new Set(restaurants.map(r=>r.city))].sort();
  const cuisines=[...new Set(restaurants.flatMap(r=>Array.isArray(r.cuisines)?r.cuisines:(r.cuisine?[r.cuisine]:[])))].sort();
  const allRaters=[...new Set(restaurants.flatMap(r=>Object.keys(normalizeRest(r).ratings||{})))].sort();
  const filteredRest=restaurants.filter(r=>{
    const norm=normalizeRest(r);const rc=Array.isArray(r.cuisines)?r.cuisines:(r.cuisine?[r.cuisine]:[]);
    return(!restFilter.k1||r.city===restFilter.k1)&&(!restFilter.k2||rc.includes(restFilter.k2))&&(!restFilter.author||Object.keys(norm.ratings||{}).includes(restFilter.author))&&(!restFilter.search||r.name.toLowerCase().includes(restFilter.search.toLowerCase()));
  }).sort((a,b)=>getAvgRest(b).avg-getAvgRest(a).avg);
  const suggCities=[...new Set(suggestions.map(s=>s.city))].sort();
  const suggCuisines=[...new Set(suggestions.flatMap(s=>Array.isArray(s.cuisines)?s.cuisines:[]))].sort();
  const filteredSugg=suggestions.filter(s=>{
    const c=Array.isArray(s.cuisines)?s.cuisines:[];
    return(!suggFilter.k1||s.city===suggFilter.k1)&&(!suggFilter.k2||c.includes(suggFilter.k2))&&(!suggFilter.search||s.name.toLowerCase().includes(suggFilter.search.toLowerCase()));
  });

  const valRest=()=>{const e={};if(!form.name.trim())e.name="Bitte Name eingeben";if(!form.city.trim())e.city="Bitte Stadt eingeben";if(!form.cuisines.length)e.cuisines="Bitte Küche auswählen";return e;};
  const valSugg=()=>{const e={};if(!suggForm.name.trim())e.name="Bitte Name eingeben";if(!suggForm.city.trim())e.city="Bitte Stadt eingeben";if(!suggForm.cuisines.length)e.cuisines="Bitte Küche auswählen";return e;};

  const handleAdd=async()=>{const e=valRest();if(Object.keys(e).length){setErrors(e);return;}setSaving(true);try{const id=Date.now().toString();await db.ref("restaurants/"+id).set({id,name:form.name,city:form.city,cuisines:form.cuisines,author:user,ratings:{[user]:{food:form.food,service:form.service,price:form.price,stars:form.stars}}});if(suggToConvert){await db.ref("suggestions/"+suggToConvert.id).remove();setSuggToConvert(null);}setForm(EMPTY_REST);setErrors({});setView("list");setSection("list");showToast("✅ Gespeichert!");}catch{showToast("⚠️ Fehler");}setSaving(false);};
  const handleEdit=r=>{const norm=normalizeRest(r);const my=norm.ratings?.[user]||EMPTY_RATING;setForm({name:r.name,city:r.city,cuisines:Array.isArray(r.cuisines)?r.cuisines:(r.cuisine?[r.cuisine]:[]),food:my.food,service:my.service,price:my.price,stars:my.stars});setEditingId(r.id);setSelected(null);setSuggToConvert(null);setErrors({});setView("add");setSection("list");};
  const handleUpdate=async()=>{const e=valRest();if(Object.keys(e).length){setErrors(e);return;}setSaving(true);try{await db.ref("restaurants/"+editingId).update({name:form.name,city:form.city,cuisines:form.cuisines});await db.ref(`restaurants/${editingId}/ratings/${user}`).set({food:form.food,service:form.service,price:form.price,stars:form.stars});setForm(EMPTY_REST);setEditingId(null);setErrors({});setView("list");setSection("list");showToast("✅ Aktualisiert!");}catch{showToast("⚠️ Fehler");}setSaving(false);};
  const handleDelete=async id=>{try{await db.ref("restaurants/"+id).remove();setSelected(null);showToast("🗑️ Gelöscht");}catch{showToast("⚠️ Fehler");}};
  const startRate=r=>{const norm=normalizeRest(r);setRatingForm(norm.ratings?.[user]||EMPTY_RATING);setRatingTarget(r);setSelected(null);setView("rate");};
  const handleSaveRating=async()=>{setSaving(true);try{await db.ref(`restaurants/${ratingTarget.id}/ratings/${user}`).set(ratingForm);setView("list");setSection("list");setRatingTarget(null);showToast("✅ Wertung gespeichert!");}catch{showToast("⚠️ Fehler");}setSaving(false);};
  const handleAddSugg=async()=>{const e=valSugg();if(Object.keys(e).length){setSuggErrors(e);return;}setSaving(true);try{const id=Date.now().toString();await db.ref("suggestions/"+id).set({id,name:suggForm.name,city:suggForm.city,cuisines:suggForm.cuisines,author:user});setSuggForm(EMPTY_SUGG);setSuggErrors({});setView("suggestions");setSection("suggestions");showToast("✅ Vorschlag gespeichert!");}catch{showToast("⚠️ Fehler");}setSaving(false);};
  const handleDeleteSugg=async id=>{try{await db.ref("suggestions/"+id).remove();setSuggSelected(null);showToast("🗑️ Gelöscht");}catch{showToast("⚠️ Fehler");}};
  const handleConvertSugg=s=>{setForm({name:s.name,city:s.city,cuisines:Array.isArray(s.cuisines)?s.cuisines:[],food:5,service:5,price:3,stars:7});setSuggToConvert(s);setEditingId(null);setErrors({});setSuggSelected(null);setView("add");setSection("list");};
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const rf=(k,v)=>setRatingForm(p=>({...p,[k]:v}));
  const sf=(k,v)=>setSuggForm(p=>({...p,[k]:v}));
  const navTo=s=>{setSection(s);setView(s);setSelected(null);setSuggSelected(null);};
  const navAdd=()=>{if(activeSection==="list"){setForm(EMPTY_REST);setEditingId(null);setErrors({});setSuggToConvert(null);setView("add");}else{setSuggForm(EMPTY_SUGG);setSuggErrors({});setView("add-suggestion");}};
  const navActive=view==="list"||view==="rate";
  const suggActive=view==="suggestions";
  const addActive=view==="add"||view==="add-suggestion";
  const navColor=t.restNavActive;
  const btn={width:"100%",padding:16,borderRadius:14,background:saving?"#ccc":t.restBtn,color:t.btnColor,fontSize:16,fontWeight:700,border:"none",cursor:saving?"not-allowed":"pointer",fontFamily:"'Playfair Display',serif",opacity:saving?0.7:1};

  if(loading)return(<div style={{minHeight:"100vh",background:t.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}><div style={{fontSize:48}}>🍽️</div><div style={{fontFamily:"'Playfair Display',serif",color:t.sub,fontSize:14}}>Lade…</div></div>);

  return(
    <div style={{minHeight:"100vh",background:t.bg,maxWidth:440,margin:"0 auto",position:"relative",paddingBottom:92,transition:"background 0.3s"}}>

        headerBg={t.restHeaderBg} headerSub={t.restHeaderSub}/>

      {view==="list"&&(
        <div style={{padding:"20px 16px"}}>
          <FilterBar filter={restFilter} setFilter={setRestFilter} col1={cities} col2={cuisines} col1Label="Alle Städte" col2Label="Alle Küchen" extra={[["author","Alle Bewerter",allRaters]]} filterOn={t.restFilterOn} filterOnColor={t.restFilterOnColor} t={t}/>
          {filteredRest.length===0?(<div style={{textAlign:"center",padding:"60px 20px",color:t.empty}}><div style={{fontSize:48}}>🍽️</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginTop:12,color:t.title}}>{restaurants.length===0?"Noch keine Restaurants":"Keine Treffer"}</div></div>):filteredRest.map(r=><RestCard key={r.id} r={r} onClick={()=>setSelected(r)} t={t}/>)}
        </div>

      {view==="suggestions"&&(
        <div style={{padding:"20px 16px"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:t.title,marginBottom:4}}>💡 Restaurant Vorschläge</div>
          <div style={{fontSize:13,color:t.sub,marginBottom:16}}>Restaurants die ihr noch besuchen möchtet</div>
          <FilterBar filter={suggFilter} setFilter={setSuggFilter} col1={suggCities} col2={suggCuisines} col1Label="Alle Städte" col2Label="Alle Küchen" filterOn={t.restFilterOn} filterOnColor={t.restFilterOnColor} t={t}/>

            <div><div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:t.title}}>{editingId?"Bearbeiten":suggToConvert?"Jetzt bewerten":"Restaurant hinzufügen"}</div>{suggToConvert&&<div style={{fontSize:12,color:t.restSuggAccent,marginTop:3}}>💡 Aus Vorschlägen übernommen</div>}</div>
          </div>
          <div style={{marginBottom:16}}><label style={{display:"block",fontSize:12,color:t.label,marginBottom:6,fontFamily:"'Playfair Display',serif"}}>Name</label><input value={form.name} onChange={e=>{f("name",e.target.value);setErrors(p=>({...p,name:""}))}} placeholder="z.B. Trattoria da Marco" style={{width:"100%",padding:"12px 14px",borderRadius:12,fontSize:15,border:`1.5px solid ${errors.name?"#e05030":t.inputBorder}`,background:t.inputBg,outline:"none",color:t.inputColor}}/>{errors.name&&<div style={{color:"#e05030",fontSize:11,marginTop:4}}>{errors.name}</div>}</div>
          <div style={{marginBottom:16}}><label style={{display:"block",fontSize:12,color:t.label,marginBottom:6,fontFamily:"'Playfair Display',serif"}}>Stadt</label><input value={form.city} onChange={e=>{f("city",e.target.value);setErrors(p=>({...p,city:""}))}} placeholder="z.B. München" list="r-cities" style={{width:"100%",padding:"12px 14px",borderRadius:12,fontSize:15,border:`1.5px solid ${errors.city?"#e05030":t.inputBorder}`,background:t.inputBg,outline:"none",color:t.inputColor}}/><datalist id="r-cities">{cities.map(c=><option key={c} value={c}/>)}</datalist>{errors.city&&<div style={{color:"#e05030",fontSize:11,marginTop:4}}>{errors.city}</div>}</div>

            <Slider label="💶 Preis" value={form.price} min={1} max={5} onChange={v=>f("price",v)} color={t.restAccent} display={`${"€".repeat(form.price)} ${PRICE_LABELS[form.price]}`} t={t}/>

          </div>
          <button onClick={editingId?handleUpdate:handleAdd} disabled={saving} style={btn}>{saving?"Speichert…":editingId?"Änderungen speichern":suggToConvert?"Bewertung speichern":"Restaurant speichern"}</button>
        </div>
      )}
      {view==="add-suggestion"&&(
        <div style={{padding:"20px 16px"}}>

          <div style={{background:t.suggBadgeBg,borderRadius:12,padding:"10px 14px",marginBottom:20,border:`1px solid ${t.suggBorder}`}}><div style={{fontSize:12,color:t.restSuggAccent}}>💡 Noch nicht besucht — als Idee für den nächsten Abend.</div></div>

  const handleAddSugg=async()=>{const e=valS();if(Object.keys(e).length){setSuggErrors(e);return;}setSaving(true);try{const id=Date.now().toString();await db.ref("whisky_suggestions/"+id).set({id,name:suggForm.name,distillery:suggForm.distillery,types:suggForm.types,author:user});setSuggForm(EMPTY_W_SUGG);setSuggErrors({});setView("suggestions");setSection("suggestions");showToast("✅ Vorschlag gespeichert!");}catch{showToast("⚠️ Fehler");}setSaving(false);};
  const handleDeleteSugg=async id=>{try{await db.ref("whisky_suggestions/"+id).remove();setSuggSelected(null);showToast("🗑️ Gelöscht");}catch{showToast("⚠️ Fehler");}};
  const handleConvertSugg=s=>{setForm({name:s.name,distillery:s.distillery,types:Array.isArray(s.types)?s.types:[],stars:7,rauchigkeit:5,fruchtigkeit:5,kommentar:""});setSuggToConvert(s);setEditingId(null);setErrors({});setSuggSelected(null);setView("add");setSection("list");};
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const rf=(k,v)=>setRatingForm(p=>({...p,[k]:v}));
  const sf=(k,v)=>setSuggForm(p=>({...p,[k]:v}));
  const navTo=s=>{setSection(s);setView(s);setSelected(null);setSuggSelected(null);};
  const navAdd=()=>{if(activeSection==="list"){setForm(EMPTY_WHISKY);setEditingId(null);setErrors({});setSuggToConvert(null);setView("add");}else{setSuggForm(EMPTY_W_SUGG);setSuggErrors({});setView("add-suggestion");}};
  const navActive=view==="list"||view==="rate";
  const suggActive=view==="suggestions";
  const addActive=view==="add"||view==="add-suggestion";
  const navColor=t.whiskyNavActive;
  const btn={width:"100%",padding:16,borderRadius:14,background:saving?"#ccc":t.whiskyBtn,color:t.btnColor,fontSize:16,fontWeight:700,border:"none",cursor:saving?"not-allowed":"pointer",fontFamily:"'Playfair Display',serif",opacity:saving?0.7:1};

  if(loading)return(<div style={{minHeight:"100vh",background:t.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}><div style={{fontSize:48}}>🥃</div><div style={{fontFamily:"'Playfair Display',serif",color:t.sub,fontSize:14}}>Lade…</div></div>);

  return(
    <div style={{minHeight:"100vh",background:t.bg,maxWidth:440,margin:"0 auto",position:"relative",paddingBottom:92,transition:"background 0.3s"}}>
      <AppHeader user={user} dark={dark} setDark={setDark} mode={mode} setMode={setMode} t={t}
        title="🥃 Whisky Führer der Montagabendgesellschaft"
        subtitle={`${whiskies.length} bewertet · ${suggestions.length} Vorschlag${suggestions.length!==1?"e":""}`}
        headerBg={t.whiskyHeaderBg} headerSub={t.whiskyHeaderSub}/>

      {view==="list"&&(
        <div style={{padding:"20px 16px"}}>
          <FilterBar filter={wFilter} setFilter={setWFilter} col1={distilleries} col2={allTypes} col1Label="Alle Destillerien" col2Label="Alle Typen" extra={[["author","Alle Bewerter",allRaters]]} filterOn={t.whiskyFilterOn} filterOnColor={t.whiskyFilterOnColor} t={t}/>
          {filteredW.length===0?(<div style={{textAlign:"center",padding:"60px 20px",color:t.empty}}><div style={{fontSize:48}}>🥃</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginTop:12,color:t.title}}>{whiskies.length===0?"Noch keine Whiskys":"Keine Treffer"}</div></div>):filteredW.map(w=><WhiskyCard key={w.id} w={w} onClick={()=>setSelected(w)} t={t}/>)}
        </div>
      )}
      {view==="suggestions"&&(
        <div style={{padding:"20px 16px"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:t.title,marginBottom:4}}>💡 Whisky Vorschläge</div>
          <div style={{fontSize:13,color:t.sub,marginBottom:16}}>Whiskys die ihr noch probieren möchtet</div>
          <FilterBar filter={sFilter} setFilter={setSFilter} col1={suggDist} col2={suggTypes} col1Label="Alle Destillerien" col2Label="Alle Typen" filterOn={t.whiskyFilterOn} filterOnColor={t.whiskyFilterOnColor} t={t}/>
          {filteredS.length===0?(<div style={{textAlign:"center",padding:"60px 20px",color:t.empty}}><div style={{fontSize:48}}>💡</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginTop:12,color:t.title}}>{suggestions.length===0?"Noch keine Vorschläge":"Keine Treffer"}</div></div>):filteredS.map(s=><WhiskySuggCard key={s.id} s={s} onClick={()=>setSuggSelected(s)} t={t}/>)}
        </div>
      )}
      {view==="add"&&(
        <div style={{padding:"20px 16px"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:16}}>
            <button onClick={()=>{setView(editingId?"list":activeSection);setForm(EMPTY_WHISKY);setEditingId(null);setSuggToConvert(null);setErrors({});}} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:t.sub,paddingTop:2}}>←</button>
            <div><div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:t.title}}>{editingId?"Bearbeiten":suggToConvert?"Jetzt bewerten":"Whisky hinzufügen"}</div>{suggToConvert&&<div style={{fontSize:12,color:t.whiskySuggAccent,marginTop:3}}>💡 Aus Vorschlägen übernommen</div>}</div>
          </div>
          <div style={{marginBottom:16}}><label style={{display:"block",fontSize:12,color:t.label,marginBottom:6,fontFamily:"'Playfair Display',serif"}}>Whisky Name</label><input value={form.name} onChange={e=>{f("name",e.target.value);setErrors(p=>({...p,name:""}))}} placeholder="z.B. Laphroaig 10 Jahre" style={{width:"100%",padding:"12px 14px",borderRadius:12,fontSize:15,border:`1.5px solid ${errors.name?"#e05030":t.inputBorder}`,background:t.inputBg,outline:"none",color:t.inputColor}}/>{errors.name&&<div style={{color:"#e05030",fontSize:11,marginTop:4}}>{errors.name}</div>}</div>
          <div style={{marginBottom:16}}><label style={{display:"block",fontSize:12,color:t.label,marginBottom:6,fontFamily:"'Playfair Display',serif"}}>Destillerie / Herkunft</label><input value={form.distillery} onChange={e=>{f("distillery",e.target.value);setErrors(p=>({...p,distillery:""}))}} placeholder="z.B. Laphroaig, Islay" list="w-dist" style={{width:"100%",padding:"12px 14px",borderRadius:12,fontSize:15,border:`1.5px solid ${errors.distillery?"#e05030":t.inputBorder}`,background:t.inputBg,outline:"none",color:t.inputColor}}/><datalist id="w-dist">{distilleries.map(d=><option key={d} value={d}/>)}</datalist>{errors.distillery&&<div style={{color:"#e05030",fontSize:11,marginTop:4}}>{errors.distillery}</div>}</div>
          <div style={{marginBottom:20}}><label style={{display:"block",fontSize:12,color:t.label,marginBottom:4,fontFamily:"'Playfair Display',serif"}}>Whisky Typ <span style={{fontWeight:400,color:form.types.length===3?"#e05030":t.tick}}>({form.types.length}/3)</span></label><TypeChips value={form.types} onChange={v=>{f("types",v);setErrors(p=>({...p,types:""}));}} options={WHISKY_TYPES} chipOn={t.whiskyChipOn} chipOnColor={t.whiskyChipOnColor} t={t}/>{errors.types&&<div style={{color:"#e05030",fontSize:11,marginTop:4}}>{errors.types}</div>}</div>
          <div style={{background:t.card,borderRadius:16,padding:20,marginBottom:16,border:`1px solid ${t.cardBorder}`}}>
            <div style={{fontSize:12,color:t.label,fontFamily:"'Playfair Display',serif",marginBottom:16,fontWeight:700}}>Deine Bewertung</div>
            <WhiskyRatingFields form={form} setF={f} t={t}/>
          </div>
          <button onClick={editingId?handleUpdate:handleAdd} disabled={saving} style={btn}>{saving?"Speichert…":editingId?"Änderungen speichern":suggToConvert?"Bewertung speichern":"Whisky speichern"}</button>
        </div>
      )}
      {view==="add-suggestion"&&(
        <div style={{padding:"20px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}><button onClick={()=>{setView("suggestions");setSuggForm(EMPTY_W_SUGG);setSuggErrors({});}} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:t.sub}}>←</button><div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:t.title}}>Whisky Vorschlag</div></div>
          <div style={{background:t.suggBadgeBg,borderRadius:12,padding:"10px 14px",marginBottom:20,border:`1px solid ${t.suggBorder}`}}><div style={{fontSize:12,color:t.whiskySuggAccent}}>💡 Noch nicht probiert — als Idee für den nächsten Abend.</div></div>
          <div style={{marginBottom:16}}><label style={{display:"block",fontSize:12,color:t.label,marginBottom:6,fontFamily:"'Playfair Display',serif"}}>Whisky Name</label><input value={suggForm.name} onChange={e=>{sf("name",e.target.value);setSuggErrors(p=>({...p,name:""}))}} placeholder="z.B. Laphroaig 10 Jahre" style={{width:"100%",padding:"12px 14px",borderRadius:12,fontSize:15,border:`1.5px solid ${suggErrors.name?"#e05030":t.inputBorder}`,background:t.inputBg,outline:"none",color:t.inputColor}}/>{suggErrors.name&&<div style={{color:"#e05030",fontSize:11,marginTop:4}}>{suggErrors.name}</div>}</div>
          <div style={{marginBottom:16}}><label style={{display:"block",fontSize:12,color:t.label,marginBottom:6,fontFamily:"'Playfair Display',serif"}}>Destillerie / Herkunft</label><input value={suggForm.distillery} onChange={e=>{sf("distillery",e.target.value);setSuggErrors(p=>({...p,distillery:""}))}} placeholder="z.B. Laphroaig, Islay" list="ws-dist" style={{width:"100%",padding:"12px 14px",borderRadius:12,fontSize:15,border:`1.5px solid ${suggErrors.distillery?"#e05030":t.inputBorder}`,background:t.inputBg,outline:"none",color:t.inputColor}}/><datalist id="ws-dist">{[...new Set([...distilleries,...suggDist])].map(d=><option key={d} value={d}/>)}</datalist>{suggErrors.distillery&&<div style={{color:"#e05030",fontSize:11,marginTop:4}}>{suggErrors.distillery}</div>}</div>
          <div style={{marginBottom:20}}><label style={{display:"block",fontSize:12,color:t.label,marginBottom:4,fontFamily:"'Playfair Display',serif"}}>Whisky Typ <span style={{fontWeight:400,color:suggForm.types.length===3?"#e05030":t.tick}}>({suggForm.types.length}/3)</span></label><TypeChips value={suggForm.types} onChange={v=>{sf("types",v);setSuggErrors(p=>({...p,types:""}));}} options={WHISKY_TYPES} chipOn={t.whiskyChipOn} chipOnColor={t.whiskyChipOnColor} t={t}/>{suggErrors.types&&<div style={{color:"#e05030",fontSize:11,marginTop:4}}>{suggErrors.types}</div>}</div>
          <button onClick={handleAddSugg} disabled={saving} style={btn}>{saving?"Speichert…":"Vorschlag speichern"}</button>
        </div>
      )}
      {view==="rate"&&ratingTarget&&(
        <div style={{padding:"20px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}><button onClick={()=>{setView("list");setSection("list");setRatingTarget(null);}} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:t.sub}}>←</button><div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:t.title}}>Wertung abgeben</div></div>
          <div style={{fontSize:13,color:t.sub,marginBottom:20,paddingLeft:36}}>{ratingTarget.name} · {ratingTarget.distillery}</div>
          <div style={{background:t.card,borderRadius:16,padding:20,marginBottom:16,border:`1px solid ${t.cardBorder}`}}>
            <WhiskyRatingFields form={ratingForm} setF={rf} t={t}/>
          </div>
          <button onClick={handleSaveRating} disabled={saving} style={btn}>{saving?"Speichert…":"Wertung speichern"}</button>
        </div>
      )}

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:440,background:t.navBg,borderTop:`1px solid ${t.navBorder}`,display:"flex",boxShadow:`0 -4px 20px ${t.navShadow}`,transition:"background 0.3s"}}>
        {[["list",navActive,()=>navTo("list"),"📋","Whisky\nÜbersicht"],["sugg",suggActive,()=>navTo("suggestions"),"💡","Whisky\nVorschläge"],["add-btn",addActive,navAdd,"➕","Hinzufügen"]].map(([key,active,onClick,icon,label])=>(
          <button key={key} onClick={onClick} style={{flex:1,padding:"11px 4px 16px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:20}}>{icon}</span>
            <span style={{fontSize:9,color:active?navColor:t.navInactive,fontWeight:active?700:400,textAlign:"center",lineHeight:1.25,whiteSpace:"pre-line"}}>{label}</span>
            {active&&<div style={{width:20,height:2,background:navColor,borderRadius:1,marginTop:1}}/>}
          </button>
        ))}
      </div>
      <WhiskyModal w={selected} user={user} onClose={()=>setSelected(null)} onDelete={handleDelete} onEdit={handleEdit} onRate={startRate} t={t}/>
      <WhiskySuggModal s={suggSelected} user={user} onClose={()=>setSuggSelected(null)} onDelete={handleDeleteSugg} onConvert={handleConvertSugg} t={t}/>
      <Toast msg={toast} color={t.whiskyToast} textColor={t.toastColor}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// TOP-LEVEL APP
// ═══════════════════════════════════════════════════════════════════════════

function App(){
  const [user,setUser]=useState(()=>localStorage.getItem("rmg_user")||null);
  const [dark,setDark]=useState(false);
  const [mode,setMode]=useState("restaurant");
  const t=dark?DARK:LIGHT;
  if(!user)return <LoginScreen onLogin={setUser}/>;
  if(mode==="whisky")return <WhiskyApp user={user} dark={dark} setDark={setDark} mode={mode} setMode={setMode} t={t}/>;
  return <RestaurantApp user={user} dark={dark} setDark={setDark} mode={mode} setMode={setMode} t={t}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
